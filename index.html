<!DOCTYPE html>
<html>
<head>
    <title>QuickBill Splitter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h2>💰 Bill Splitter</h2>
        
        <label>Total Bill ($)</label>
        <input type="number" id="billAmount" placeholder="0.00">

        <label>Tip (%)</label>
        <input type="number" id="tipPercentage" value="10">

        <label>Number of People</label>
        <input type="number" id="numPeople" value="1">

        <button onclick="calculate()">Calculate Split</button>

        <div class="result-box">
            <h3>Total Per Person:</h3>
            <span id="perPersonResult">$0.00</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
